name: verify
on:
  pull_request:
    branches: [main]

jobs:
  byteswarm:
    runs-on: ubuntu-latest
    services:
      # PostgreSQL service for the store contract test (internal/store
      # TestPostgresStoreContract). Ephemeral, throwaway credentials scoped to
      # the job; the SQLite/NATS tests use embedded/pure-Go engines and need no
      # service. Health check gates the test step until Postgres accepts
      # connections.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: byteswarm
          POSTGRES_PASSWORD: byteswarm
          POSTGRES_DB: byteswarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U byteswarm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: setup
        run: go mod download
      - name: lint
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"
      - name: build
        run: go build ./...
      - name: test
        env:
          # Selects the Postgres service above so TestPostgresStoreContract
          # actually runs in CI; unset locally, so the test skips cleanly.
          BYTESWARM_TEST_PG_DSN: postgres://byteswarm:byteswarm@localhost:5432/byteswarm_test?sslmode=disable
        run: go test -race -cover ./...
      - name: install govulncheck   # toolchain provisioning (stack Toolchain table)
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: security-scan
        run: govulncheck ./...
# CUSTOM: jobs below this line are preserved on regeneration
