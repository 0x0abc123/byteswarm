name: verify
on:
  pull_request:
    branches: [main]

jobs:
  byteswarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: setup
        run: go mod download
      - name: lint
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -cover ./...
      - name: install govulncheck   # toolchain provisioning (stack Toolchain table)
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: security-scan
        run: govulncheck ./...
# CUSTOM: jobs below this line are preserved on regeneration
