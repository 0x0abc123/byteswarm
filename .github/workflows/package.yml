name: package
on:
  push:
    branches: [main]

jobs:
  byteswarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: setup
        run: go mod download
      - name: package
        run: CGO_ENABLED=0 go build -o dist/ ./cmd/...
      - name: publish
        uses: actions/upload-artifact@v4
        with:
          name: byteswarm-dist
          path: dist
