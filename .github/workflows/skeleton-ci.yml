# Placeholder CI — replaced by real per-component pipelines when
# /bootstrap-structure runs the generate-cicd skill.
# Exists so the repo has a green check from day zero and so branch
# protection has a workflow to require before bootstrap completes.
name: verify
on:
  pull_request:
    branches: [main]

jobs:
  skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: template sanity
        run: |
          test -f docs/project-state.yaml
          test -f CLAUDE.md
          echo "Template intact. Real verification arrives with /bootstrap-structure."
