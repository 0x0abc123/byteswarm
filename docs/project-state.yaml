# =============================================================================
# project-state.yaml — PIPELINE SNAPSHOT (current state only)
# =============================================================================
# CONTRACT
#   * This file is OVERWRITTEN in place. It is never appended to. It must stay
#     small (~40 lines) for the life of the project.
#   * Skills read this file as a PRECONDITION check before running, and write
#     their completion status here.
#   * Every state change is committed SEPARATELY from other work, with the
#     approver's name in the commit message for sign-off events:
#       chore(state): approve architecture stage [approved-by: Jane Doe]
#   * History and traceability live in docs/state-log/ — one small file per
#     event, append-only. Nothing in the pipeline ever reads state-log/
#     wholesale; it exists for humans and audits.
#   * Decision DETAIL never lives here. This file holds pointers (ADR ids);
#     the "why" lives in docs/adr/.
# =============================================================================

schema_version: 1

project:
  name: byteswarm             # set by architecture-advisor
  initialized: 2026-07-10T07:19:05Z  # ISO-8601, set on first architecture-advisor run

# ---------------------------------------------------------------------------
# Pipeline stages. Allowed status values: not_started | in_progress | complete
# A stage is UNLOCKED when the previous stage has status: complete AND
# approved: true. Skills must refuse to run if their stage is locked.
# ---------------------------------------------------------------------------
stages:
  architecture:               # skill: architecture-advisor
    status: complete
    approved: true
    approved_by: 0x0abc123
    approved_at: 2026-07-10T07:19:05Z
    artifacts: docs/adr/

  c4design:                  # skill: c4-designer
    status: complete
    approved: true
    approved_by: 0x0abc123
    approved_at: 2026-07-10T08:49:17Z
    artifacts: docs/c4/

  bootstrap:                  # skill: bootstrap-structure
    status: complete
    approved: true
    approved_by: 0x0abc123
    approved_at: 2026-07-11T01:09:34Z
    ci_green: true            # exit criterion: build + empty test suite + CI pass
    artifacts: "."

# ---------------------------------------------------------------------------
# Active decisions — POINTERS ONLY. Values here are quick-reference keys for
# skills (e.g. generate-cicd reads ci_provider); rationale lives in the ADR.
# ---------------------------------------------------------------------------
active:
  architecture_style: modular-monolith   # -> see adr_refs
  backend_language: go        # go | python | mixed
  clients: [cli, webhook]     # CLI primary; webhook ingress
  release_trigger: git-tag    # v* tags publish versioned static binaries (adr 0012)
  data_stores: [postgresql, sqlite]      # behind a Repository port
  event_bus: nats-jetstream   # behind a Bus port (see adr 0004)
  ci_provider: github         # github | gitlab | jenkins
  deploy_targets: [vm, container, kubernetes]   # serverless excluded
  plugin_model: script-js+native-go   # goja JS script plugins coexist with compiled-in Go (adr 0008)
  adr_refs:                   # decision key -> ADR id (filename prefix)
    architecture_style: "0001"   # style stands; consumer-exec dimension amended by 0008
    client_approach: "0011"      # 0002 superseded by 0011 (/events over Unix domain socket)
    backend_language: "0003"
    event_bus: "0004"            # event-type token rule superseded by 0010 (single dot-free token)
    data_stores: "0005"          # storage-representation superseded by 0009 (opaque bytes: BYTEA/BLOB)
    deploy_targets: "0006"
    ci_provider: "0007"
    plugin_model: "0008"
    release_trigger: "0012"      # v* tag -> versioned static-binary GitHub Release

# ---------------------------------------------------------------------------
# Refactors IN FLIGHT only. When a refactor completes, its entry is REMOVED
# from this list and a completion event is written to docs/state-log/.
# ---------------------------------------------------------------------------
refactors:                    # refactor-0001..0004 completed (see docs/state-log/)
  - id: refactor-0005
    summary: "contained goja JS job-runner binary (byteswarm-job) for long-running handlers"
    status: impact_analysis
    approved_by: null
    affected_stages: [c4design, bootstrap]
    adr_refs: ["0006", "0008"]
  # refactor-0001, refactor-0002 completed (see docs/state-log/)
